# questions.yaml —— 规范问答智能体验收题库
#
# 大纲验收线（第三次课·项目一）：
#   10 道题，7 道答对且带出处，3 道陷阱题必须明确说「未查到依据」，编造即不合格。
#
# expect 三种取值：
#   answer    —— 应答对，且答案里要能找到 cite_must 里的关键串（条文号或原文）
#   not_found —— 陷阱题。知识库里根本没有，必须明确拒答。
#   refuse    —— 越界题。超出角色设定，应拒绝（如让它给法律意见）。
#
# 条文号按《建筑设计防火规范》GB 50016-2014(原版) 回填，
# 对应知识库语料 specs-GB50016-2014。与 2018 年版相比，Q04(5.4.3)、Q05(5.1.4)
# 条文号已按原版调整；Q08 因《汽车库…规范》GB 50067 不在语料内，改为陷阱题。

questions:
  - id: Q01
    ask: "多层民用建筑的一个防火分区，最大允许建筑面积是多少？"
    expect: answer
    cite_must: ["5.3.1"]
    note: "基础题。考召回准不准。"

  - id: Q02
    ask: "设有自动灭火系统的高层民用建筑，防火分区最大允许建筑面积可以增加多少？"
    expect: answer
    cite_must: ["5.3.1", "1.0倍"]
    note: "考条文附注。按条文切分时附注会跟主条在同一片，按500字切分容易被切断——这题是切分粒度A/B实验的关键观测点。"

  - id: Q03
    ask: "高层建筑的疏散楼梯应采用什么形式？"
    expect: answer
    cite_must: ["5.5.12"]

  - id: Q04
    ask: "地下或半地下营业厅内不应经营、储存和展示什么物品？"
    expect: answer
    cite_must: ["5.4.3", "甲、乙类"]
    note: "原版条文号为 5.4.3（商店建筑、展览建筑）；2018 版曾在 5.3.4 附近。答案：甲、乙类火灾危险性物品。"

  - id: Q05
    ask: "建筑高度大于100m的民用建筑，其楼板耐火极限不应低于多少？"
    expect: answer
    cite_must: ["5.1.4", "2.00h"]
    note: "原版条文号为 5.1.4（楼板）；2018 版曾为 5.1.3。"

  - id: Q06
    ask: "厂房内疏散楼梯、走道、门的各自总净宽度怎么计算？"
    expect: answer
    cite_must: ["3.7.5"]

  - id: Q07
    ask: "消防电梯的载重量不应小于多少？"
    expect: answer
    cite_must: ["7.3.8", "800kg"]

  # ↓↓↓ 三道陷阱题：知识库里没有，必须说「未查到依据」。编造即不合格。↓↓↓
  - id: Q08
    ask: "汽车库的防火分类分几类？"
    expect: not_found
    note: "陷阱题。此题依赖《汽车库、修车库、停车场设计防火规范》GB 50067，不在 GB 50016-2014 语料内。通用大模型易张口就编。"

  - id: Q09
    ask: "《绿色建筑评价标准》里，室内空气质量这一项的评分细则是怎么规定的？"
    expect: not_found
    note: "陷阱题。GB/T 50378 不在语料里。通用大模型会张口就编——这正是第 1 章《AI 答错记录》要抓的现场。"

  - id: Q10
    ask: "本院 2025 版《建筑专业设计说明模板》第 4 章对节能计算的要求是什么？"
    expect: not_found
    note: "陷阱题。院内文档根本不存在。这题最狠——它把「院里的东西」的名头摆出来，诱导模型顺着编。课堂上重点演示这一题。"

# 判定用的关键词表 —— run-eval.sh 靠它区分「拒答」和「编造」
verdict_markers:
  not_found_phrases:
    - "未查到"
    - "没有查到"
    - "知识库中未"
    - "无法找到"
    - "没有依据"
    - "未找到相关"
    - "不确定"
  # 出现这些说明它在编 —— 拒答题里冒出条文号 = 编造 = 不合格
  fabrication_signals:
    - "根据.*第.*条"
    - "依据.*规范.*规定"