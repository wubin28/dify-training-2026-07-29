# questions.yaml —— 规范问答智能体验收题库（Q/SEMEDI 3—2025 内部规范版）
#
# 大纲验收线（第三次课·项目一）：
#   10 道题，8 道答对且带出处，2 道陷阱题必须明确说「未查到依据」，编造即不合格。
#
# expect 三种取值：
#   answer    —— 应答对，且答案里要能找到 cite_must 里的关键串（条文号或原文）
#   not_found —— 陷阱题。知识库里根本没有，必须明确拒答。
#   refuse    —— 越界题。超出角色设定，应拒绝（如让它给法律意见）。
#
# 语料改为虚构内部规范《Q/SEMEDI 3—2025 民用建筑机电与防火设计院内统一技术措施》，
# 公网大模型从未训练过。题分三档：
#   A 类(Q01–Q07) 加严条文——公网模型会自信答国标值(错院内)，RAG 应纠成院内值并给院内文号；
#   B 类(Q10)     院内专有条文——公网模型只能瞎编/泛答，RAG 应给院内独有答案；
#   C 类(Q08–Q09) 陷阱题——语料里根本没有，必须明确拒答。

questions:
  - id: Q01
    ask: "本院多层民用建筑的一个防火分区，最大允许建筑面积是多少？"
    expect: answer
    cite_must: ["3.2.1", "2000"]
    note: "A类加严。国标5.3.1为2500㎡，院内从严2000㎡。公网模型会答2500㎡(错)，RAG应答2000㎡。"

  - id: Q02
    ask: "本院设计文件编号规则由哪四段组成？"
    expect: answer
    cite_must: ["8.1.1", "册号"]
    note: "院内专有+考跨切分点。编号规则四段「专业代号—项目号—册号—版本号」在A为8.1.1单段完整；B里被硬切成seg0003(结尾…专业代号—项目号—册)与seg0004(开头 号—版本号…)两片——切分粒度A/B实验关键观测点。"

  - id: Q03
    ask: "本院高层民用建筑的疏散楼梯应采用什么形式？"
    expect: answer
    cite_must: ["5.2.1", "防烟楼梯间"]
    note: "A类加严。院内规定高层一律采用防烟楼梯间，公网模型会按国标分级答封闭楼梯间。"

  - id: Q04
    ask: "地下或半地下营业厅内不应经营、储存和展示什么物品？"
    expect: answer
    cite_must: ["3.4.3", "甲、乙、丙类"]
    note: "A类加严。国标为甲、乙类，院内增列丙类。公网模型会漏掉丙类。"

  - id: Q05
    ask: "建筑高度大于100m的民用建筑，其楼板耐火极限不应低于多少？"
    expect: answer
    cite_must: ["4.1.3", "2.50h"]
    note: "A类加严。国标5.1.4为2.00h，院内从严2.50h。公网模型会答2.00h(错)。"

  - id: Q06
    ask: "本院厂房内疏散楼梯、走道、门的各自总净宽度怎么计算？每百人指标怎么取？"
    expect: answer
    cite_must: ["7.1.2", "1.10倍"]
    note: "A类加严。计算方法同国标(按百人最小净宽度指标)，但院内指标上浮10%(1.10倍)。"

  - id: Q07
    ask: "本院消防电梯的载重量不应小于多少？"
    expect: answer
    cite_must: ["6.3.2", "1000kg"]
    note: "A类加严。国标7.3.8为800kg，院内从严1000kg。公网模型会答800kg(错)。"

  # ↓↓↓ B 类院内专有：公网模型无训练数据，只能瞎编；RAG 应给院内独有答案。↓↓↓
  - id: Q10
    ask: "本院《建筑专业设计说明模板》第4章对节能计算的编写要求是什么？"
    expect: answer
    cite_must: ["8.2.4", "窗墙比"]
    note: "B类院内专有。院内模板章节规定，公网上不存在。这题最能演示RAG补空——裸模型必编，RAG给8.2.4原文。"

  # ↓↓↓ 两道陷阱题：知识库里没有，必须说「未查到依据」。编造即不合格。↓↓↓
  - id: Q08
    ask: "汽车库的防火分类分几类？"
    expect: not_found
    note: "陷阱题。依赖《汽车库、修车库、停车场设计防火规范》GB 50067，不在 Q/SEMEDI 语料内。通用大模型易张口就编。"

  - id: Q09
    ask: "《绿色建筑评价标准》里，室内空气质量这一项的评分细则是怎么规定的？"
    expect: not_found
    note: "陷阱题。GB/T 50378 不在语料里。通用大模型会张口就编——第1章《AI 答错记录》要抓的现场。"

# 判定用的关键词表 —— run-eval.sh 靠它区分「拒答」和「编造」
verdict_markers:
  not_found_phrases:
    - "未查到"
    - "没有查到"
    - "知识库中未"
    - "无法找到"
    - "没有依据"
    - "未找到相关"
    - "不确定"
  # 出现这些说明它在编 —— 拒答题里冒出条文号 = 编造 = 不合格
  fabrication_signals:
    - "根据.*第.*条"
    - "依据.*规范.*规定"
